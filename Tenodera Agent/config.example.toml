# Tenodera Agent configuration
# Place this file at /etc/tenodera/agent.toml

# Address and port to listen on
bind = "0.0.0.0:9091"

# API key for authenticating panel connections.
# The panel must send this key in the Authorization header or query parameter.
# Leave empty to allow all connections (NOT recommended for production).
api_key = ""

# TLS certificate and private key paths (PEM format).
# Both must be set to enable TLS. Without TLS, the agent runs unencrypted.
# tls_cert = "/etc/tenodera/cert.pem"
# tls_key = "/etc/tenodera/key.pem"

# Allow running without TLS. Set to false in production.
allow_unencrypted = true
